user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	log_format main '$remote_addr - $remote_user [$time_local] "$request" '
		'$status $body_bytes_sent "$scheme://$host" "$http_referer" '
		'"$http_user_agent" "$http_x_forwarded_for"';

	access_log /var/log/nginx/access.log main;

	sendfile on;
	client_max_body_size 128M;
	keepalive_timeout 65;

	# HTTP/2 + TLS performance baseline
	ssl_session_cache shared:SSL:10m;
	ssl_session_timeout 10m;

	gzip_static on;
	gzip_vary on;
	gzip on;
	gzip_comp_level 5;
	gzip_types text/css text/javascript text/xml text/plain application/javascript application/json application/xml application/rss+xml;
	gzip_min_length 1024;
	gzip_proxied any;
	gzip_disable "msie6";

	# WebSocket upgrade helper (preferred over if-blocks in location)
	map $http_upgrade $connection_upgrade {
		default upgrade;
		'' close;
	}

	include /etc/nginx/conf.d/*.conf;
}
