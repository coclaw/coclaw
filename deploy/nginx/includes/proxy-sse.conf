include /etc/nginx/includes/proxy-common.conf;

# SSE: 关闭缓冲/缓存/压缩，保证事件实时推送
# gzip off 是防御性兜底：当前 gzip_types 不含 text/event-stream，但若 server
# 误发 application/json 响应头，会被 gzip 缓冲压缩，导致事件延迟下发
proxy_buffering off;
proxy_cache off;
gzip off;

# 长连接超时（1h），避免空闲断开
proxy_read_timeout 3600s;
proxy_send_timeout 3600s;
