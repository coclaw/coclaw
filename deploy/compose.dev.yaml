services:
  mysql:
    container_name: coclaw-mysql
    image: mysql:8.0.36-bookworm
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --lower_case_table_names=1
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: coclaw_root_2026
      MYSQL_DATABASE: coclaw
      MYSQL_USER: coclaw
      MYSQL_PASSWORD: coclaw_db_2026
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - coclaw_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # TURN/STUN 服务（WebRTC 中继）
  # 本地开发用，host 网络模式让 coturn 直接使用 WSL2/主机网络栈，
  # 无需逐个映射 relay 端口。
  coturn:
    container_name: coclaw-coturn
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    command: >-
      turnserver
      --listening-port=3478
      --external-ip=127.0.0.1
      --realm=localhost
      --lt-cred-mech
      --use-auth-secret
      --static-auth-secret=dev-secret-placeholder
      --min-port=50000
      --max-port=50100
      --fingerprint
      --no-cli
      --verbose

volumes:
  coclaw_mysql_data:
    name: coclaw_mysql_data
