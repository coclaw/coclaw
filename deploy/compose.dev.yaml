services:
  mysql:
    container_name: coclaw-mysql
    image: mysql:8.0.36-bookworm
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --lower_case_table_names=1
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: coclaw_root_2026
      MYSQL_DATABASE: coclaw
      MYSQL_USER: coclaw
      MYSQL_PASSWORD: coclaw_db_2026
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - coclaw_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  coclaw_mysql_data:
    name: coclaw_mysql_data
